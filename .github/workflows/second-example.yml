name: My First Workflow

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        
      - name: Welcome message
        run: sudo apt-get install cowsay -y
        
      - name: Generate ASCII artwork
        run: cowsay -f dragon "Run for cover, I am a dragon.....RR" >> dragon.txt

      - name: Read File
        run: cat dragon.txt

      - name: List files
        run: ls -ltra

      # - name: Read file
      #   run: cat README.md
